<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYMENT ZHANOFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --glass: rgba(0, 242, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Cyber Grid Background */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--glass) 1px, transparent 1px),
                              linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            animation: moveGrid 10s linear infinite;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 30px; }
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px rgba(0, 242, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .logo-admin {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 25px;
        }

        .payment-methods, .contact-admin {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px;
            border: 1px solid var(--neon-blue);
            background: transparent;
            color: #fff;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 25px var(--neon-blue);
        }

        .btn-tele { border-color: #0088cc; }
        .btn-tele:hover { background: #0088cc; box-shadow: 0 0 20px #0088cc; }

        .btn-wa { border-color: #25d366; }
        .btn-wa:hover { background: #25d366; box-shadow: 0 0 20px #25d366; }

        .note-box {
            font-size: 0.8rem;
            background: rgba(255, 0, 0, 0.1);
            border-left: 3px solid #ff0000;
            padding: 10px;
            margin-top: 20px;
            text-align: left;
            line-height: 1.4;
        }

        /* Modal Popup for QRIS/Info */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #111;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid var(--neon-blue);
            max-width: 100%;
            text-align: center;
        }

        .modal img { width: 100%; border-radius: 10px; }
        .close-btn { margin-top: 15px; color: var(--neon-blue); cursor: pointer; display: block; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="container">
        <img src="https://files.catbox.moe/muzanj.jpg" alt="Logo Admin" class="logo-admin">
        <h1>PAYMENT ZHANOFFICIAL</h1>

        <div class="payment-methods">
            <button class="btn" onclick="showModal('qris')">VIA QRIS (ALL PAY)</button>
            <button class="btn" onclick="showPayInfo('DANA', '0882008170684')">VIA DANA</button>
            <button class="btn" onclick="showPayInfo('GOPAY', '083838202776')">VIA GOPAY</button>
        </div>

        <hr style="border: 0.5px solid var(--glass); margin: 20px 0;">

        <div class="contact-admin">
            <a href="https://wa.me/62882008170684" class="btn btn-wa">WHATSAPP ADMIN</a>
            <a href="https://t.me/zhan_store" class="btn btn-tele">TELEGRAM ADMIN</a>
        </div>

        <div class="note-box">
            🚫 𝑁𝑜𝑡𝑒 : 𝐻𝑎𝑟𝑎𝑝 𝑠𝑐𝑟𝑒𝑛𝑠ℎ𝑜𝑡 𝐵𝑢𝑘𝑡𝑖 𝑇𝑟𝑎𝑛𝑠𝑓𝑒𝑟/𝑇𝑟𝑎𝑛𝑠𝑎𝑘𝑠𝑖 𝐴𝑔𝑎𝑟 𝐿𝑒𝑏𝑖ℎ 𝐸𝑓𝑒𝑠𝑖𝑒𝑛 𝑈𝑛𝑡𝑢𝑘 𝑚𝑒𝑛𝑔𝑘𝑜𝑛𝑓𝑖𝑟𝑚𝑎𝑠𝑖 𝐾𝑒𝑚𝑎𝑠𝑢𝑘𝑎𝑛 𝑆𝑎𝑙𝑑𝑜 ✅
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 15px; color: var(--neon-blue);"></h2>
            <div id="modalBody"></div>
            <span class="close-btn" onclick="closeModal()">[ CLOSE ]</span>
        </div>
    </div>

    <script>
        function showModal(type) {
            const modal = document.getElementById('paymentModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            if(type === 'qris') {
                title.innerText = 'SCAN QRIS';
                body.innerHTML = '<img src="https://files.catbox.moe/iaemcg.jpg" alt="QRIS">';
            }
            modal.style.display = 'flex';
        }

        function showPayInfo(method, num) {
            const modal = document.getElementById('paymentModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            title.innerText = method + ' INFO';
            body.innerHTML = `<p style="font-size: 1.5rem; letter-spacing: 2px;">${num}</p><p style="margin-top:10px">Silahkan salin nomor di atas</p>`;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target == document.getElementById('paymentModal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
